# Test override: Redis is disabled so unit tests don't try to connect.
# This file takes precedence over main/resources/misc.yml on the test classpath.

paths:
  feature-config-directory: modules

redis:
  enabled: false
  ip: localhost
  port: 25001
  username: default
  password: ""
  server-name: test-server
  main-server: true

join:
  grace-period: 5

portal:
  enabled: false

bees:
  enabled: false

xaction:
  server-name: test-server
  enabled: false

sync:
  enabled: false

date-format: "dd.MM.yyyy"
timezone: "Europe/Moscow"

worlds: {}
world-names: {}
respawn-intercept-worlds: []
