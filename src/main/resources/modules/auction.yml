# =============================================================================
# auction.yml — категории предметов для аукциона / stock-интеграции (discord и т.д.).
# =============================================================================

# Категории для группировки лотов (строковые теги)
discord-categories:
  - block
  - potions
  - tools
  - weapons
  - misc
# Как часто обновлять кэш/рассылку (секунды; зависит от кода Stock/Auction)
refresh-rate: 1200
# Транслировать ли новые лоты в широковещание
broadcast-items: false
