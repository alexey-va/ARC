# =============================================================================
# location-pools.yml — сообщения редактора пулов локаций (YAML).
#
# Сами координаты пулов хранятся отдельно: каталог location_pools/*.yml (JSON в .yml)
# через LocationPoolConfig (Java). Здесь только тексты для игрока при /locpool.
# =============================================================================

messages:
  # Начато редактирование пула %name%
  start-editing: <green>Начато редактирование пула локаций %name%!
  # Блок успешно убран из пула
  block-removed: <green>Блок удален!
  # Клик не по блоку из текущего пула
  not-in-pool: <red>Блок не в пуле!
  # Блок добавлен в пул
  block-added: <green>Блок добавлен!
  # Игрок отменил редактирование
  cancel-editing: <red>Редактирование пула локаций %name% отменено!
  # Неверный тип блока при постановке маркера
  invalid-block: <red>Вы поставили неверный блок! <gray>При редактировании используйте
    только блоки <gold>золото<gray> и <red>красный камень<gray>!
  # Игрок не в режиме редактирования (дублирует config/commands при необходимости)
  not-editing: <gray>Вы не редактируете никакой пул локаций!
  # Редактирование сброшено по таймауту неактивности
  timeout-editing: <red>Редактирование пула локаций %name% завершено из-за неактивности!

# --- Редактор: частицы подсветки и таймаут сессии (тики) ---
editor:
  particle-interval: 5
  particle-delay: 10
  timeout-check-interval: 1200
  timeout-check-delay: 10
  nearby-radius: 50.0
  particle:
    type: END_ROD
    count: 10
    extra: 0.0
    offset: 0.1
