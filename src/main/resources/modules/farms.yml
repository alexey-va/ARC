# =============================================================================
# farms.yml — фермы и лесопилка (FarmManager): мир, регион WorldGuard, блоки, лимиты.
# farm / lumbermill — отдельные зоны; blocks-per-hour, particles, permission внутри секций.
# =============================================================================

# Право на админ-команды ферм
admin-permission: arc.farm-admin
farm:
  enable: true
  world: sp11
  region: farm
  particles: true
  permission: arc.farm
  blocks-per-hour: 5120
  blocks:
    - WHEAT
    - CARROTS
    - POTATOES
    - BEETROOTS
    - MELON
    - PUMPKIN
  enabled: true
lumbermill:
  enable: true
  world: sp11
  region: wood
  permission: arc.lumber
