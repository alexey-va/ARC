# =============================================================================
# leafdecay.yml — ускоренное опадание листвы (LeafDecayManager + LeafChecker).
#
# Слои:
#   — скан чанка, материалы, «пузыри» листвы (LeafChecker);
#   — интервалы задач и список миров (LeafDecayManager).
# leaf-decay-worlds: перечислите миры, где модуль активен; пусто = нигде.
# =============================================================================

# --- Сканирование высоты в чанке (Y) ---
scan-min-height: 0
scan-max-height: 256

# --- Материалы ---
leaf-materials:
  - OAK_LEAVES
  - SPRUCE_LEAVES
  - BIRCH_LEAVES
  - JUNGLE_LEAVES
  - ACACIA_LEAVES
  - DARK_OAK_LEAVES
  - AZALEA_LEAVES
  - FLOWERING_AZALEA_LEAVES
  - OAK_FENCE
  - SPRUCE_FENCE
  - BIRCH_FENCE
  - JUNGLE_FENCE
  - ACACIA_FENCE
  - DARK_OAK_FENCE
  - CRIMSON_FENCE
  - WARPED_FENCE
  - IRON_BARS
  - NETHER_BRICK_FENCE

trunk-materials:
  - OAK_LOG
  - SPRUCE_LOG
  - BIRCH_LOG
  - JUNGLE_LOG
  - ACACIA_LOG
  - DARK_OAK_LOG
  - STRIPPED_OAK_LOG
  - STRIPPED_SPRUCE_LOG
  - STRIPPED_BIRCH_LOG
  - STRIPPED_JUNGLE_LOG
  - STRIPPED_ACACIA_LOG
  - STRIPPED_DARK_OAK_LOG
  - OAK_WOOD
  - SPRUCE_WOOD
  - BIRCH_WOOD
  - JUNGLE_WOOD
  - ACACIA_WOOD
  - DARK_OAK_WOOD
  - STRIPPED_OAK_WOOD
  - STRIPPED_SPRUCE_WOOD
  - STRIPPED_BIRCH_WOOD
  - STRIPPED_JUNGLE_WOOD
  - STRIPPED_ACACIA_WOOD
  - STRIPPED_DARK_OAK_WOOD
  - CRIMSON_STEM
  - WARPED_STEM
  - STRIPPED_CRIMSON_STEM
  - STRIPPED_WARPED_STEM
  - CRIMSON_HYPHAE
  - WARPED_HYPHAE
  - STRIPPED_CRIMSON_HYPHAE
  - STRIPPED_WARPED_HYPHAE
  - OAK_PLANKS
  - SPRUCE_PLANKS
  - BIRCH_PLANKS
  - JUNGLE_PLANKS
  - ACACIA_PLANKS
  - DARK_OAK_PLANKS
  - CRIMSON_PLANKS
  - WARPED_PLANKS
  - OAK_FENCE
  - SPRUCE_FENCE
  - BIRCH_FENCE
  - JUNGLE_FENCE
  - ACACIA_FENCE
  - DARK_OAK_FENCE
  - CRIMSON_FENCE
  - WARPED_FENCE
  - NETHER_BRICK_FENCE

# --- Логика отрыва листвы от ствола (LeafChecker) ---
# Макс. расстояние «листва — опора/ствол» (блоки)
leaf-distance: 8
# Учитывать диагональ при поиске связи со стволом
diagonal-scan: true
# Вероятность пометить лист для проверки за один проход по блоку в чанке (0–1)
decay-chance: 0.01
# Срезать «висячие» островки листвы без опоры
remove-floating-blobs: true
max-blob-size: 20
max-trunk-blocks: 3

# --- Планировщик (LeafDecayManager; значения в тиках, 20 тиков = 1 с) ---
# Как часто обрабатывать очередь опадания
decay-interval: 20
# Как часто опрашивать чанки из очереди
global-check-interval: 20
# Раз в сколько тиков «checkTask» обходить все миры из списка (счётчик в коде)
world-check-interval: 1
# Сколько блоков за один тик decay-задачи
leaf-batch-size: 30

play-particles: true
play-sound: true

# Миры с активным leaf-decay (имена как в Bukkit); пусто — модуль не трогает миры
leaf-decay-worlds: [ ]
