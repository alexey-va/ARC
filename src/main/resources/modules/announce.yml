# =============================================================================
# announce.yml — ротация объявлений в чат (AnnounceModule).
# config.delay-seconds — пауза между циклами выбора сообщения.
# messages.<id> — одно объявление: type, weight, conditions, servers (all|…).
# =============================================================================

config:
  # Интервал между показами (секунды)
  delay-seconds: 1800
messages:
  '1':
    message: '<dark_gray>● <gray>Варп с данжами: <gold>/ag'
    servers: all
    player-specific: false
    cache: true
    conditions:
      - type: permission
        permission: mcfine.chat-notify
    type: chat
    serialization-type: mini_message
    weight: 1
    personal: false
