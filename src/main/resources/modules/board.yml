# =============================================================================
# board.yml — доска объявлений (BoardModule): цены, права, тексты GUI и предметов.
# main-server — только на главном инстансе публикуются глобальные объявления (если так в коде).
# =============================================================================

# Макс. длина краткого заголовка объявления
short-name-length: 40
# Срок жизни записи на доске (секунды)
entry-lifetime-seconds: 259200
# Стоимость публикации (экономика сервера)
publish-cost: 5000
# Интервал напоминания / анонса (секунды)
seconds-announce: 600
# Право видеть входящие объявления
receive-permission: arc.board-announce
# Стоимость редактирования
edit-cost: 1000
main-server: true
create-entry-gui-name: <dark_gray>Создать объявление
edit-entry-gui-name: <dark_gray>Редактировать объявление
board-gui-name: <dark_gray>Доска объявлений
rate-gui-name: <dark_gray>Оценить объявление
main-menu-back-command: mm
not-enough-money: <dark_red>У вас недостаточно денег!
click-to-edit:
  - ''
  - <green>Shift+ЛКМ <gray>чтобы изменить
click-to-rate:
  - ''
  - <green>ЛКМ <gray>чтобы оценить
item:
  display: <dark_gray>⚠ <#92bed8><short_name>
  description-prefix: <white>     - <gray>
  description:
    - ' <dark_gray>ℹ <white>Подробности:'
    - <description_text>
  lore:
    - ' '
    - ' <dark_gray>⭐ <white>Объявитель: <#92bed8><player>'
    - ' <dark_gray>⌛ <white>Тип: <#ffacd5><type>'
    - ' <dark_gray>⌚ <white>Исчезнет через: <#969696><expire>'
    - ' <dark_gray>🔥 <white>Жалоб: <#fc3848><reports>'
    - <description>
  click-to-edit:
    - ''
    - ' <dark_gray>✎ <gray>нажмите <green>Shift+ПКМ <gray>чтобы редактировать'
  click-to-rate:
    - ''
    - ' <dark_gray>✎ <gray>нажмите <green>ПКМ <gray>чтобы оценить'
rate-menu:
  up-display: <green>Оценить положительно
  up-lore: [ ]
  down-display: <red>Оценить отрицательно
  down-lore: [ ]
  report-display: <dark_red>Пожаловаться
  report-lore: [ ]
  cant-rate: <dark_red>Вы не можете оценить это объявление
  already-rate: <dark_red>Вы уже поставили эту оценку
  already-report: <dark_red>Вы уже пожаловались!
  success-rate: <gold>Объявление оценено!
  success-report: <gold>Жалоба подана!
board-menu:
  publish-display: <gray>Опубликовать объявление
  publish-lore: ' <dark_gray>● <white>Цена: <green><cost><white>💰'
  refresh-display: <gray>Обновить
  refresh-lore: [ ]
  back-display: <gray>Назад
  back-lore: [ ]
add-menu:
  delete-display: <red>Удалить
  delete-lore: [ ]
  confirm-delete: <dark_red>Нажмите для потверждения
  edit-display: <gray>Изменить
  edit-lore: '<gray>Цена: '
  published-successfully: <green>Ваше сообщение было опубликовано!
  edited-successfully: <green>Ваше сообщение было изменено!
  not-completed: <red>Остались незаполненные поля!
  publish-display: <gray>Опубликовать
  publish-lore: [ ]
  empty:
    short-name:
      display: <green>Короткое название <gray>(макс. длина <short_name_length>)
      lore:
        - <gray>Нажмите чтобы установить
    description:
      display: <green>Комментарий
      lore:
        - <gray>Нажмите чтобы установить
    icon:
      display: <green>Иконка
      lore:
        - <gray>Перетащите чтобы установить
  full:
    short-name:
      display: <short_name>
      lore:
        - <gray>Нажмите чтобы поменять
    description:
      display: <green>Комментарий
      lore:
        - <description>
    icon:
      display: <green>Иконка
      lore:
        - <gray>Перетащите чтобы поменять
    type:
      display: <type>
      lore:
        - <green>Тип сообщения
        - <gray>Нажмите чтобы поменять
    boss-bar-color:
      display: <green>Цвет
      lore:
        - '<gray>Цвет панели: <white><color>'
seconds-boss-bar: 10
keep-for: 10
color: YELLOW
boss-bar-colors:
  red: <red>Красный</red>
  green: <green>Зелёный</green>
  yellow: <yellow>Жёлтый</yellow>
  white: <white>Белый</white>
  blue: <blue>Синий</blue>
  pink: <light_purple>Розовый</light_purple>
  purple: <purple>Фиолетовый</purple>
