# =============================================================================
# mobspawn.yml — дозаспавн мобов в мире (MobSpawnModule). enabled: false по умолчанию.
# =============================================================================

mobspawn:
  # Список типов мобов и весов (формат: ENTITY:вес, см. MobSpawnConfig)
  mobs: [ ]
  # Период проверки спавна (тики)
  interval: 10
  # Миры, где действует логика (пусто = нигде)
  worlds: [ ]
  # Час начала окна спавна (0–23)
  start-hour: 13
  # Час конца окна (0 = полночь)
  end-hour: 0
  # Включить модуль
  enabled: false
  # Радиус поиска точки спавна от игрока
  radius: 50.0
  # Порог «слишком много мобов» рядом — пропуск спавна
  threshold: 5
  # Сколько мобов пытаться заспавнить за тик/итерацию
  amount: 2
  # Множитель попыток поиска безопасной точки
  try-multiplier: 30
  # Максимальный уровень освещённости блока (ночной спавн)
  max-light-level: 7
  # Использовать CMI для разброса точки (если CMI есть)
  use-cmi-command: true
  # Радиус для CMI spread (блоки)
  cmi-spread: 30
