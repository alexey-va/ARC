# =============================================================================
# personalloot.yml — персональные сундуки (BetterStructures / BS loot).
# GUI: guis/personal-loot.yml (заголовок, слоты). Здесь — лимиты и сообщения.
# =============================================================================

# Максимум игроков, которые могут «зарегистрироваться» на одном сундуке
max-players: 5
# Типы инвентарей Bukkit, где обрабатывается открытие (CHEST, BARREL, …)
inventories:
  - CHEST
# Подтягивать лут из конфигов BetterStructures
use-bs-loot: true
# Сколько раз нужно сломать блок, чтобы уничтожить сундук и очистить данные
max-breaks: 3
messages:
  # При ломании; плейсхолдер <amount> — сколько ударов осталось до разрушения
  break: <red>Этот сундук нужно сломать еще <amount> раз
  # Когда у сундука уже max-players и игрок не в списке; %amount% — текущее число
  max-players: <red>Слишком много игроков уже открыли этот сундук!
  # Лут уже забран (пустой CustomLootData)
  already-opened: <red>Вы уже открывали этот сундук
