# =============================================================================
# logging.yml — опциональная отправка логов в Loki (Log4j2 + Tjahzi).
# На свежей установке выключено; host = localhost. Включите и укажите свой Loki.
# =============================================================================

# Метки, добавляемые к каждому событию (например service_name для фильтра в Grafana)
labels:
  service_name: spawn
# Хост Loki / Pushgateway (не IP продакшена в репозитории)
host: localhost
# Порт приёма (часто 3100)
port: 3100
# Ограничение частоты отправки (зависит от appender)
rate: 20
maxBurst: 10
# Включить удалённый аппендер
enabled: false
# Минимальный уровень, уходящий в Loki (INFO, WARN, …)
level: INFO
