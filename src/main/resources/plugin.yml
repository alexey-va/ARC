name: ARC
version: '${project.version}'
main: ru.arc.ARC
api-version: 1.20
libraries:
  - com.google.code.gson:gson:2.10.1
  - redis.clients:jedis:5.2.0-beta4
  - org.jsoup:jsoup:1.17.2
  - org.eclipse.jetty.websocket:websocket-client:9.4.54.v20240208
softdepend:
  - Parties
  - Lands
  - Citizens
  - CMI
  - WorldGuard
  - EliteMobs
  - HuskHomes
  - ProtectionStones
  - Slimefun
  - EconomyShopGUI-Premium
  - AdvancedEnchantments
  - ItemsAdder
  - ProtocolLib
  - ProtocolSupport
  - ViaVersion
  - ViaBackwards
  - ViaRewind
  - Geyser-Spigot
  - YamipaPlugin
  - LootChest
  - Jobs
  - BetterStructures
  - PlaceholderAPI
  - Duels
  - BetterRTP
commands:
  arc:
    description: Main command
    usage: Main command
  x:
    description: x
    usage: x
  locpool:
    description: Edit location pools
    usage: /locpool [pool]
  treasure-hunt:
    description: Treasure hunt admin
    usage: /treasure-hunt [status|types|start|stop]
  treasure-pool:
    description: Treasure reward pools
    usage: /treasure-pool [pool] [action]
  build-book:
    description: Give auto-build book
    usage: /build-book <building> <model-id> [rotation] [y-offset] [name...]
  arc-invest:
    description: Stock market GUI
    usage: /arc-invest [gui|buy|sell|portfolio]
  sound-follow:
    description: Play follow sound for player
    usage: /sound-follow <player> <namespace:sound>
  give-jobs-boost:
    description: Give Jobs Reborn boost
    usage: /give-jobs-boost <player> <job|all> <multiplier> <type> <duration>
  arcstore:
    description: Open player store
    usage: /arcstore [player]
  arctest:
    description: ARC dev test commands
    usage: /arctest <action>
  eliteloot:
    description: Elite loot admin
    usage: /eliteloot [list|add]
