# =============================================================================
# misc.yml — глобальные настройки ARC (Redis, порталы, синк, join/quit GUI, миры).
# Стиль YAML: элементы списков (-) вложены в ключ (на 2 пробела правее, чем ключ).
#
# Фичевые YAML (announce, board, mobspawn, …) лежат в каталоге modules/ — см. paths ниже и ConfigManager.ofModule.
#
# Важно:
#   - redis.server-name и xaction.server-name: логическое имя инстанса (тесты ждут
#     test-server; на проде замените на имя вашего сервера, одно и то же везде).
#   - redis.password: пустой в репозитории; на проде задайте пароль.
# Секции: redis, join, portal, bees, xaction, sync, join-message-gui, leave-message-gui,
#         date-format, timezone, worlds, world-names, respawn-intercept-worlds.
#
# join-message-gui / leave-message-gui: длинные списки — типичный прод-экспорт;
#   замените тексты на свои (MiniMessage, плейсхолдер %player_name%).
# world-names: ключ = имя мира Bukkit; значение = подпись (MiniMessage / & коды).
# =============================================================================

# --- Пути данных (документация; загрузчик в коде: ConfigManager.MODULE_YAML_DIR) ---
paths:
  # Каталог с per-module *.yml относительно папки плагина
  feature-config-directory: modules

# --- Redis: Jedis; используется репозиториями и кросс-сервером ---
redis:
  # Хост и порт экземпляра Redis
  ip: localhost
  port: 25001
  # ACL Redis (часто default)
  username: default
  # Пароль; в репозитории пусто — задайте на сервере
  password: ""
  # Имя этого сервера в кластере (должно совпадать с ожиданиями XCondition и т.п.)
  server-name: test-server
  # true если это «главный» инстанс для логики, завязанной на main-server
  main-server: true

# --- Вход игрока: краткая неуязвимость и полное здоровье ---
join:
  # Временная неуязвимость при входе
  invulnerable-enabled: true
  full-heal: true
  # Длительность неуязвимости (тики Bukkit)
  invulnerable-ticks: 140
  # Задержка перед полным хилом (тики)
  full-heal-delay-ticks: 30

# --- Порталы из команд (PlayerWarps / CMI): частицы, радиусы, сообщения ---
# Раньше дублировалось в portal.yml — теперь только эта секция (CommandListener, CMIListener, Portal).
portal:
  # Включить обработку «портальных» команд
  command-portals: true
  # Подкоманды, которые не открывают портал
  excluded-sub-commands:
    - about
    - addwarps
    - amount
    - ban
    - category
    - desc
    - favourite
    - icon
    - list
    - open
    - rate
    - reload
    - set
    - setowner
    - remove
    - removeall
    - rename
    - reset
  # Алиасы команд, считающихся «варпами»
  aliases:
    - pw
    - warp
  # Проверять ли варпы PlayerWarps / CMI перед порталом
  check-player-warps: true
  check-cmi-warps: false
  # Типы CMI-телепортов, при которых показывается портальный эффект (CMIListener)
  cmi-tp-types:
    - home
    - warmup
    - spawn
  # Сообщение при появлении портала (MiniMessage)
  message: <dark_green>Недалеко появляется портал...
  # Дистанция отображения частиц
  particle-distance: 50.0
  # DUST_COLOR_TRANSITION: цвета и размер рамки
  border:
    color:
      red-start: 121
      green-start: 56
      blue-start: 163
      red-end: 0
      green-end: 0
      blue-end: 0
      size: 0.5
    offset: 0.015
    count: 2
    particle: DUST_COLOR_TRANSITION
  portal-particle:
    count: 5
    particle: PORTAL
    extra: 0.2
    offset: 0.3
  blindness: true
  blindness-radius: 2.0
  blindness-duration: 40
  radius-initial: 3
  radius-secondary: 6
  tp-other-disabled:
    message: <red>Этот игрок не разрешил другим игрокам телепортироваться через его
      порталы!
  tp-by-other-disabled:
    message: <red>Вы не можете телепортироваться через порталы других игроков!
# --- Пасека (если используется связанная фича) ---
bees:
  enabled: false

# --- Имя сервера для XAction / кросс-сервера (см. также redis.server-name) ---
xaction:
  server-name: test-server

# --- Синхронизация данных с другими плагинами (модули SyncModule) ---
sync:
  em: true
  cmi: false
  aura-skills: true
  duels: true
  slimefun: true

