# =============================================================================
# config/commands.yml — подкоманды /arc: name, aliases, permission, player-only, usage.
# messages — MiniMessage для подсказок и ошибок (common, buildbook, hunt, treasures).
# =============================================================================

commands:
  help:
    name: help
    aliases: [ ]
    permission: ''
  reload:
    name: reload
    aliases: [ ]
    permission: arc.admin
  board:
    name: board
    aliases: [ ]
    permission: arc.board
  baltop:
    name: baltop
    aliases: [ ]
    permission: arc.baltop
    player-only: true
  audit:
    name: audit
    aliases: [ ]
    permission: arc.audit
  repo:
    name: repo
    aliases: [ ]
    permission: arc.admin
  emshop:
    name: emshop
    aliases: [ ]
    permission: arc.admin
  jobsboosts:
    name: jobsboosts
    aliases: [ ]
    permission: arc.jobsboosts
  logger:
    name: logger
    aliases: [ ]
    permission: arc.admin
  joinmessage:
    name: joinmessage
    aliases: [ ]
    permission: arc.join-message-gui
  quitmessage:
    name: quitmessage
    aliases: [ ]
    permission: arc.join-message-gui
  respawnonrtp:
    name: respawnonrtp
    aliases: [ ]
    permission: arc.rtp-respawn
  locpool:
    name: locpool
    aliases: [ ]
    permission: arc.locpool.admin
  hunt:
    name: hunt
    aliases: [ ]
    permission: arc.treasure-hunt
    player-only: false
  schedules:
    name: schedules
    aliases: [ scheduler, cron ]
    permission: arc.schedules.gui
    player-only: true
    usage: /arc schedules [run <id>]
  restart:
    name: restart
    aliases: [ reboot ]
    permission: arc.restart
    player-only: false
    usage: /arc restart [-servers all|spawn,survival] [-delay 3m] | /arc restart cancel
  treasures:
    name: treasures
    aliases: [ ]
    permission: arc.treasures.admin
    player-only: false
  test:
    name: test
    aliases: [ ]
    permission: arc.test
  buildbook:
    name: buildbook
    aliases: [ ]
    permission: arc.command.buildbook
    player-only: true
    usage: /arc buildbook <building> <model-id> [rotation] [y-offset] [name...]
  eliteloot:
    name: eliteloot
    aliases: [ ]
    permission: arc.eliteloot
  invest:
    name: invest
    aliases: [ ]
    permission: arc.stocks.buy
  store:
    name: store
    aliases: [ ]
    permission: arc.store
  giveboost:
    name: giveboost
    aliases: [ ]
    permission: arc.admin.givejobsboost
  give:
    name: give
    aliases: [ ]
    permission: arc.give
    player-only: false
    usage: /arc give <player|list> <preset> [amount]
  soundfollow:
    name: soundfollow
    aliases: [sound-follow]
    permission: arc.sound-follow
    usage: /arc soundfollow <player> <namespace:sound>
messages:
  common:
    usage: '<red>Использование: <gray>%usage%'
  buildbook:
    not-found: <red>Строение <white>%name%<red> не найдено!
  hunt:
    no-types: <gray>Нет настроенных пресетов охот
    types-header: <gold>═══ Пресеты охот ═══
    types-blank: ''
    types-custom-header: <gold>─── Custom ───
    types-stop-hint: '<gray>Стоп: <white>/arc hunt stop <location_pool>'
    type-name: <yellow>%type%
    type-location: '<gray>  location_pool: <white>%location_pool%%pool_size%'
    type-treasure: '<gray>  treasure_pool: <white>%treasure_pools%'
    type-chest: '<gray>  chest: <white>%chests%'
    type-start: '<gray>  → <white>/arc hunt start %type% [сундуков]'
    custom-hint: '<gray>пул:  <white>/arc hunt start custom <location_pool> <chests> <chest> <treasure_pool>'
    generate-hint: '<gray>ген:  <white>/arc hunt start custom generate <x> <y> <z> <radius> <chests> <chest> <treasure_pool>'
    chest-hint: '<gray>chest — модель сундука (pumpkin_1, vanilla, …) · treasure_pool — loot из /arc treasures'
    custom-not-enough-args: '<red>Недостаточно аргументов! <gray>/arc hunt start custom <location_pool> <chests> <chest> <treasure_pool>'
    generate-not-enough-args: '<red>Недостаточно аргументов! <gray>/arc hunt start custom generate here ... или custom generate <x> <y> <z> ...'
    generate-player-only: <red>Режим <white>here<red> только для игрока в мире.
    generate-no-world: <red>Не удалось определить мир для генерации.
    invalid-radius:
      <red>Неверный радиус: <white>%value%
    location-pool-not-found: <red>Пул локаций <white>%location_pool%<red> не найден!
    specify-location-pool: <red>Укажите location_pool для остановки!
    not-enough-args: '<red>Недостаточно аргументов! <gray>Синтаксис: /arc hunt start custom <location_pool> <chests> <namespace> <treasure_pool>'
    active-item: '<gray>• <white>%location_pool% <gray>- <yellow>%chests%<gray> сундуков'
  treasures:
    list-header: '<gold>Пулы наград (%count%):'
    list-item: <gray>• <white>%pool_id% <gray>(%size% предметов)
  give:
    unknown-preset: '<red>Неизвестный пресет: <white>%preset%<gray>. Список: <white>/arc give list'
    hint: '<gray>Примеры: sf_lootbox, ae_lootbox, enchant_token, money_bag, lootbox_bundle'
    success: '<green>Выдано <white>%count%<green> предмет(ов) пресета <white>%preset%<green> игроку <white>%player%'
