# =============================================================================
# config/commands.yml — подкоманды /arc: name, aliases, permission, player-only, usage.
# messages — MiniMessage для подсказок и ошибок (common, buildbook, hunt, treasures).
# =============================================================================

commands:
  help:
    name: help
    aliases: [ ]
    permission: ''
  reload:
    name: reload
    aliases: [ ]
    permission: arc.admin
  board:
    name: board
    aliases: [ ]
    permission: arc.board
  baltop:
    name: baltop
    aliases: [ ]
    permission: arc.baltop
    player-only: true
  audit:
    name: audit
    aliases: [ ]
    permission: arc.audit
  repo:
    name: repo
    aliases: [ ]
    permission: arc.admin
  emshop:
    name: emshop
    aliases: [ ]
    permission: arc.admin
  jobsboosts:
    name: jobsboosts
    aliases: [ ]
    permission: arc.jobsboosts
  logger:
    name: logger
    aliases: [ ]
    permission: arc.admin
  joinmessage:
    name: joinmessage
    aliases: [ ]
    permission: arc.join-message-gui
  quitmessage:
    name: quitmessage
    aliases: [ ]
    permission: arc.join-message-gui
  respawnonrtp:
    name: respawnonrtp
    aliases: [ ]
    permission: arc.rtp-respawn
  locpool:
    name: locpool
    aliases: [ ]
    permission: arc.locpool.admin
  hunt:
    name: hunt
    aliases: [ ]
    permission: arc.treasure-hunt
    player-only: false
  treasures:
    name: treasures
    aliases: [ ]
    permission: arc.treasures.admin
    player-only: false
  test:
    name: test
    aliases: [ ]
    permission: arc.test
  buildbook:
    name: buildbook
    aliases: [ ]
    permission: arc.command.buildbook
    player-only: true
    usage: /arc buildbook <building> <model-id> [rotation] [y-offset] [name...]
  eliteloot:
    name: eliteloot
    aliases: [ ]
    permission: arc.eliteloot
  invest:
    name: invest
    aliases: [ ]
    permission: arc.stocks.buy
  store:
    name: store
    aliases: [ ]
    permission: arc.store
  giveboost:
    name: giveboost
    aliases: [ ]
    permission: arc.admin.givejobsboost
  soundfollow:
    name: soundfollow
    aliases: [ ]
    permission: arc.sound-follow
messages:
  common:
    usage: '<red>Использование: <gray>%usage%'
  buildbook:
    not-found: <red>Строение <white>%name%<red> не найдено!
  hunt:
    no-types: <gray>Нет настроенных типов охот
    types-header: '<gold>Доступные типы охот:'
    type-item: '<gray>• <white>%type% <gray>(пул: %pool%)'
    start-hint: '<gray>Запуск: <white>/arc hunt <тип> [сундуков]'
  treasures:
    list-header: '<gold>Пулы наград (%count%):'
    list-item: <gray>• <white>%pool_id% <gray>(%size% предметов)
