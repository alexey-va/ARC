# Store GUI Configuration
# Player item storage interface

store:
  # GUI title
  title: "<dark_gray>Хранилище"

  # Back button
  back:
    display: "<gray>« Назад"
    lore: []
    customModelData: 11013
  back-command: "menu"
  cooldown:
    display: "<red>Подождите..."
    lore:
    - "<gray>Вы кликаете слишком быстро!"

  # No inventory space message
  no-space:
    display: "<red>Нет места!"
    lore:
    - "<gray>В вашем инвентаре нет места"
    - "<gray>для этого предмета."

  # Item was removed by someone else
  item-is-gone:
    display: "<red>Предмет исчез!"
    lore:
    - "<gray>Этот предмет больше не доступен."


