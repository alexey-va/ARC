# =============================================================================
# stocks/stock.yml — биржа / invest (StockMarket): API-ключи, тики обновления, список акций.
# finn-api-key / poly-api-key — задайте в проде; в репозитории пустые строки.
# =============================================================================

# Только главный сервер обновляет котировки (типичная схема)
main-server: true
# Как часто тянуть цены (секунды)
stock-refresh-rate: 300
# Комиссия брокера (доля 0–1)
commission: 0.005
# Параметр кредитного плеча (см. StockPlayerManager)
leverage-power: 0.7
finn-api-key: ""
poly-api-key: ""
# Команда «назад» из GUI инвестиций
main-menu-back-command: menu
default-max-stock-amount: 10
stock-market-location: 0,0,0,sp11
update-images-radius: 1000
max-buy-price: 100000
max-leveraged-price: 5000000
dividend-period: 86400
history-lifetime: 259200
dividend-percent-from-price: 0.02
max-stock-permissions:
  - arc.invest.max.20:20
  - arc.invest.max.30:30
